{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 glass-card">
                <div class="card-header bg-success text-white text-center py-4 rounded-top-4">
                    <h3 class="mb-0 fw-bold"><i class="fa-solid fa-user-plus me-2"></i> Join EcoTrack AI</h3>
                </div>
                <div class="card-body p-5">
                    <form action="{{ url_for('signup') }}" method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-success"></i></span>
                                <input type="text" class="form-control border-start-0" name="username" placeholder="EcoWarrior" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-success"></i></span>
                                <input type="email" class="form-control border-start-0" name="email" placeholder="name@example.com" required>
                            </div>
                        </div>
                        <div class="mb-5">
                            <label class="form-label fw-bold text-muted">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-success"></i></span>
                                <input type="password" class="form-control border-start-0" name="password" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-success btn-lg py-3 rounded-pill fw-bold shadow">
                                Create Account <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                        <p class="text-center text-muted mb-0">
                            Already have an account? <a href="{{ url_for('login') }}" class="text-success text-decoration-none fw-bold">Login here</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
